table:
  name: priorite
  schema: ec
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
select_permissions:
  - role: commissaire
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: >-
      En phase de commission, les commissaires peuvent voir toutes les
      priorités.
  - role: intervenant
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - intervenant:
              visible:
                _eq: true
          - enseignement:
              _and:
                - anneeByAnnee:
                    visible:
                      _eq: true
                - mention:
                    _and:
                      - cursus:
                          visible:
                            _eq: true
                      - visible:
                          _eq: true
                - parcours:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir les priorités des
      intervenants visibles pour les enseignements visibles si l'année, le 
      cursus, la mention et (éventuellement) le parcours sont tous visibles.
