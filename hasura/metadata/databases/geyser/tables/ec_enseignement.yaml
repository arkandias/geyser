table:
  name: enseignement
  schema: ec
object_relationships:
  - name: anneeByAnnee
    using:
      foreign_key_constraint_on: annee
  - name: mention
    using:
      foreign_key_constraint_on: mention_id
  - name: parcours
    using:
      foreign_key_constraint_on: parcours_id
  - name: parent
    using:
      foreign_key_constraint_on: parent_id
  - name: type_enseignement
    using:
      foreign_key_constraint_on: type
array_relationships:
  - name: demandes
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: demande
          schema: ec
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: enseignement
          schema: ec
  - name: priorites
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: priorite
          schema: ec
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: responsable
          schema: ec
computed_fields:
  - name: groupes_corriges
    definition:
      function:
        name: groupes_corriges
        schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - annee
        - annee_cycle
        - description
        - groupes
        - groupes_ouverts
        - heures
        - id
        - mention_id
        - nom
        - nom_court
        - parcours_id
        - parent_id
        - regle_priorite
        - semestre
        - type
        - visible
      computed_fields:
        - groupes_corriges
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: >-
      En phase de commission, les commissaires peuvent voir tous les
      enseignements.
  - role: intervenant
    permission:
      columns:
        - annee
        - annee_cycle
        - description
        - groupes
        - groupes_ouverts
        - heures
        - id
        - mention_id
        - nom
        - nom_court
        - parcours_id
        - parent_id
        - regle_priorite
        - semestre
        - type
        - visible
      computed_fields:
        - groupes_corriges
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _is_null: true
          - anneeByAnnee:
              visible:
                _eq: true
          - mention:
              _and:
                - cursus:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
          - parcours:
              visible:
                _eq: true
          - visible:
              _eq: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir les enseignements
      visibles dont l'année, le cursus, la mention et (éventuellement) le
      parcours sont tous visibles.
update_permissions:
  - role: intervenant
    permission:
      columns:
        - description
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _is_null: true
          - _or:
              - responsables:
                  uid:
                    _eq: X-Hasura-User-Id
              - parcours:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
              - mention:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
      check: null
    comment: >-
      Lorsque Geyser est ouvert, les intervenants responsables d'un
      enseignement, de sa mention ou de son parcours peuvent mettre à jour sa
      description.
