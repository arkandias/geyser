table:
  name: intervenant
  schema: ec
array_relationships:
  - name: demandes
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: demande
          schema: ec
  - name: messages
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: message
          schema: ec
  - name: modifications_service
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: modification_service
          schema: ec
  - name: priorites
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: priorite
          schema: ec
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: responsable
          schema: ec
  - name: services
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: service
          schema: ec
insert_permissions:
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _is_null: true
          - uid:
              _eq: X-Hasura-User-Id
          - nom:
              _eq: X-Hasura-Last-Name
          - prenom:
              _eq: X-Hasura-First-Name
      columns:
        - alias
        - nom
        - prenom
        - uid
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent créer leur propre
      profil.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - actif
        - alias
        - nom
        - prenom
        - uid
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: >-
      En phase de commission, les commissaire peuvent voir tous les
      intervenants.
  - role: intervenant
    permission:
      columns:
        - actif
        - alias
        - nom
        - prenom
        - uid
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _is_null: true
          - visible:
              _eq: true
      query_root_fields:
        - select_by_pk
      subscription_root_fields:
        - select_by_pk
    comment: >-
      Lorsque Geyser est ouvert, les commissaire peuvent voir tous les
      intervenants visibles.
update_permissions:
  - role: intervenant
    permission:
      columns:
        - nom
        - prenom
        - uid
      filter: { }
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _is_null: true
          - uid:
              _eq: X-Hasura-User-Id
          - nom:
              _eq: X-Hasura-Last-Name
          - prenom:
              _eq: X-Hasura-First-Name
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent mettre à jour leur
      propre profil.
