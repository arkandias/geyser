table:
  name: message
  schema: ec
object_relationships:
  - name: anneeByAnnee
    using:
      foreign_key_constraint_on: annee
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
  - name: type_message
    using:
      foreign_key_constraint_on: type
insert_permissions:
  - role: commissaire
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - type:
              _eq: note_commission
      columns:
        - annee
        - contenu
        - type
        - uid
    comment: En phase de commission, les commissaires peuvent créer des notes pour l'année en cours et pour tous les intervenants.
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - type:
              _eq: message_intervenant
      columns:
        - annee
        - contenu
        - type
        - uid
    comment: En phase de voeux, les intervenants peuvent créer un message pour l'année en cours.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - annee
        - id
        - contenu
        - type
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les messages et toutes les notes.
  - role: intervenant
    permission:
      columns:
        - annee
        - id
        - contenu
        - type
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              visible:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - type:
              _eq: message_intervenant
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir leurs messages de toutes les années visibles.
update_permissions:
  - role: commissaire
    permission:
      columns:
        - contenu
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - type:
              _eq: note_commission
      check: null
    comment: En phase de commission, les commissaires peuvent modifier le contenu des notes de l'année en cours pour tous les intervenants.
  - role: intervenant
    permission:
      columns:
        - contenu
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - type:
              _eq: message_intervenant
      check: null
    comment: En phase de voeux, les intervenants peuvent modifier le contenu de leur message de l'année en cours.
delete_permissions:
  - role: commissaire
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - type:
              _eq: note_commission
    comment: En phase de commission, les commissaires peuvent supprimer les notes de l'année en cours pour tous les intervenants.
  - role: intervenant
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - type:
              _eq: message_intervenant
    comment: En phase de voeux, les intervenants peuvent supprimer leur message de l'année en cours.
