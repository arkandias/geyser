                - visible:
                    _eq: true
          - intervenant:
              visible:
                _eq: true
          - type:
              _eq: note_commission
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
      check: null
    comment: ""
  - role: intervenant
    permission:
      columns:
        - contenu
      filter:
        _and:
          - anneeByAnnee:
              _and:
                - en_cours:
                    _eq: true
