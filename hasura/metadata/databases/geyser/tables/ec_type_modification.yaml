table:
  name: type_modification
  schema: ec
array_relationships:
  - name: modifications_service
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: modification_service
          schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: >-
      En phase de commission, les commissaires peuvent voir tous les types de
      modification de service.
  - role: intervenant
    permission:
      columns:
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: fermeture
              - en_cours:
                  _is_null: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir tous les types de
      modification de service.
