table:
  name: annee
  schema: ec
array_relationships:
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: annee
        table:
          name: enseignement
          schema: ec
  - name: messages
    using:
      foreign_key_constraint_on:
        column: annee
        table:
          name: message
          schema: ec
  - name: modifications_service
    using:
      foreign_key_constraint_on:
        column: annee
        table:
          name: modification_service
          schema: ec
  - name: services
    using:
      foreign_key_constraint_on:
        column: annee
        table:
          name: service
          schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - en_cours
        - value
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: >-
      En phase de commission, les commissaires peuvent voir toutes les années.
  - role: intervenant
    permission:
      columns:
        - en_cours
        - value
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _neq: true
          - visible:
              _eq: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir toutes les années
      visibles.
