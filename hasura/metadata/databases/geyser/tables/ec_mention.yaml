table:
  name: mention
  schema: ec
object_relationships:
  - name: cursus
    using:
      foreign_key_constraint_on: cursus_id
array_relationships:
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: mention_id
        table:
          name: enseignement
          schema: ec
  - name: parcours
    using:
      foreign_key_constraint_on:
        column: mention_id
        table:
          name: parcours
          schema: ec
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: mention_id
        table:
          name: responsable
          schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - cursus_id
        - id
        - nom
        - nom_court
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: >-
      En phase de commission, les commissaires peuvent voir toutes les mentions.
  - role: intervenant
    permission:
      columns:
        - cursus_id
        - id
        - nom
        - nom_court
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: fermeture
                  - en_cours:
                      _neq: true
          - visible:
              _eq: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir toutes les
      mentions visibles.
