table:
  name: demande
  schema: ec
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
  - name: type_demande
    using:
      foreign_key_constraint_on: type
computed_fields:
  - name: heures_eqtd
    definition:
      function:
        name: heures_eqtd
        schema: ec
  - name: prioritaire
    definition:
      function:
        name: prioritaire
        schema: ec
insert_permissions:
  - role: commissaire
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - enseignement:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - type:
              _eq: attribution
      columns:
        - ens_id
        - heures
        - type
        - uid
    comment: >-
      En phase de commission, les commissaires peuvent créer des attributions
      pour tous les intervenants et pour tous les enseignements de l'année en
      cours.
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _and:
                - anneeByAnnee:
                    en_cours:
                      _eq: true
                - mention:
                    _and:
                      - cursus:
                          visible:
                            _eq: true
                      - visible:
                          _eq: true
                - parcours:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
          - type:
              _neq: attribution
      columns:
        - ens_id
        - heures
        - type
        - uid
    comment: >-
      En phase de voeux, les intervenants peuvent faire des demandes principales
      ou secondaires pour des enseignements visibles de l'année en cours dont
      le cursus, la mention et (éventuellement) le parcours sont tous visibles.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - ens_id
        - heures
        - id
        - type
        - uid
      computed_fields:
        - heures_eqtd
        - prioritaire
      filter:
        _exists:
          _table:
            name: phase
            schema: ec
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: >-
      En phase de commission, les commissaires peuvent voir toutes les demandes.
  - role: intervenant
    permission:
      columns:
        - ens_id
        - heures
        - id
        - type
        - uid
      computed_fields:
        - heures_eqtd
        - prioritaire
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - intervenant:
              visible:
                _eq: true
          - enseignement:
              _and:
                - anneeByAnnee:
                    visible:
                      _eq: true
                - mention:
                    _and:
                      - cursus:
                          visible:
                            _eq: true
                      - visible:
                          _eq: true
                - parcours:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: ec
                  _where:
                    _and:
                      - value:
                          _eq: consultation
                      - en_cours:
                          _eq: true
              - enseignement:
                  anneeByAnnee:
                    en_cours:
                      _is_null: true
              - type:
                  _neq: attribution
      allow_aggregations: true
    comment: >-
      Lorsque Geyser est ouvert, les intervenants peuvent voir les demandes des
      intervenants visibles pour les enseignements visibles si l'année, le
      cursus, la mention et (éventuellement) le parcours sont tous visibles.
      Ils ne peuvent voir les attributions pour les enseignements de l'année en 
      cours qu'en phase de consultation.
update_permissions:
  - role: commissaire
    permission:
      columns:
        - heures
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - enseignement:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - type:
              _eq: attribution
      check: null
    comment: >-
      En phase de commission, les commissaires peuvent modifier toutes les
      attributions pour des enseignements de l'année en cours.
  - role: intervenant
    permission:
      columns:
        - heures
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _and:
                - anneeByAnnee:
                    en_cours:
                      _eq: true
                - mention:
                    _and:
                      - cursus:
                          visible:
                            _eq: true
                      - visible:
                          _eq: true
                - parcours:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
          - type:
              _neq: attribution
      check: null
    comment: >-
      En phase de voeux, les intervenants peuvent modifier leurs demandes
      principales ou secondaires pour un enseignement visible de l'année en
      cours dont le cursus, la mention et (éventuellement) le parcours sont tous
      visibles.
delete_permissions:
  - role: commissaire
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - enseignement:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - type:
              _eq: attribution
    comment: >-
      En phase de commission, les commissaires peuvent supprimer toutes les
      attributions pour des enseignements de l'année en cours.
  - role: intervenant
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: ec
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _and:
                - anneeByAnnee:
                    en_cours:
                      _eq: true
                - mention:
                    _and:
                      - cursus:
                          visible:
                            _eq: true
                      - visible:
                          _eq: true
                - parcours:
                    visible:
                      _eq: true
                - visible:
                    _eq: true
          - type:
              _neq: attribution
    comment: >-
      En phase de voeux, les intervenants peuvent supprimer leurs demandes
      principales ou secondaires pour un enseignement visible de l'année en
      cours dont le cursus, la mention et (éventuellement) le parcours sont tous
      visibles.
