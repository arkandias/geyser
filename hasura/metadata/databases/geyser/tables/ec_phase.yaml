table:
  name: phase
  schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - en_cours
        - value
        - visible
      filter: {}
    comment: Les commissaires peuvent voir toutes les phases.
  - role: intervenant
    permission:
      columns:
        - en_cours
        - value
        - visible
      filter:
        visible:
          _eq: true
    comment: Les intervenants peuvent voir toutes les phases visibles.
