table:
  name: parcours
  schema: ec
object_relationships:
  - name: mention
    using:
      foreign_key_constraint_on: mention_id
array_relationships:
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: parcours_id
        table:
          name: enseignement
          schema: ec
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: parcours_id
        table:
          name: responsable
          schema: ec
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - mention_id
        - nom
        - nom_court
        - visible
      filter:
        visible:
          _eq: true
    comment: ""
  - role: intervenant
    permission:
      columns:
        - id
        - mention_id
        - nom
        - nom_court
        - visible
      filter:
        visible:
          _eq: true
    comment: ""
