table:
  name: course
  schema: public
object_relationships:
  - name: parent
    using:
      foreign_key_constraint_on: parent_id
  - name: program
    using:
      foreign_key_constraint_on: program_id
  - name: track
    using:
      foreign_key_constraint_on: track_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
  - name: yearByYear
    using:
      foreign_key_constraint_on: year
array_relationships:
  - name: coordinations
    using:
      foreign_key_constraint_on:
        column: course_id
        table:
          name: coordination
          schema: public
  - name: children
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: course
          schema: public
  - name: priorities
    using:
      foreign_key_constraint_on:
        column: course_id
        table:
          name: priority
          schema: public
  - name: requests
    using:
      foreign_key_constraint_on:
        column: course_id
        table:
          name: request
          schema: public
computed_fields:
  - name: totalHoursEffective
    definition:
      function:
        name: total_hours_effective
        schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - year
        - cycle_year
        - description
        - groups
        - groups_adjusted
        - groups_effective
        - hours
        - hours_adjusted
        - hours_effective
        - id
        - program_id
        - name
        - name_short
        - track_id
        - parent_id
        - priority_rule
        - semester
        - type
        - visible
      computed_fields:
        - totalHoursEffective
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all courses during assignments phase only"
  - role: teacher
    permission:
      columns:
        - year
        - cycle_year
        - description
        - groups
        - groups_adjusted
        - groups_effective
        - hours
        - hours_adjusted
        - hours_effective
        - id
        - program_id
        - name
        - name_short
        - track_id
        - parent_id
        - priority_rule
        - semester
        - type
        - visible
      computed_fields:
        - totalHoursEffective
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - _and:
                  - yearByYear:
                      visible:
                        _eq: true
                  - program:
                      _and:
                        - degree:
                            visible:
                              _eq: true
                        - visible:
                            _eq: true
                  - track:
                      visible:
                        _eq: true
                  - visible:
                      _eq: true
              - coordinations:
                  uid:
                    _eq: X-Hasura-User-Id
              - track:
                  coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
              - program:
                  coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
              - requests:
                  service:
                    uid:
                      _eq: X-Hasura-User-Id
              - priorities:
                  service:
                    uid:
                      _eq: X-Hasura-User-Id
    comment: "When application is not in shutdown phase, can view courses that are either: visible with visible year/degree/program/track, under their coordination, or linked to their requests/priorities"
update_permissions:
  - role: teacher
    permission:
      columns:
        - description
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - coordinations:
                  uid:
                    _eq: X-Hasura-User-Id
              - track:
                  coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
              - program:
                  coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
      check: null
    comment: "When application is not in shutdown phase, can update course description for courses under their coordination"
