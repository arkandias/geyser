table:
  name: enseignement
  schema: public
object_relationships:
  - name: anneeByAnnee
    using:
      foreign_key_constraint_on: annee
  - name: mention
    using:
      foreign_key_constraint_on: mention_id
  - name: parcours
    using:
      foreign_key_constraint_on: parcours_id
  - name: parent
    using:
      foreign_key_constraint_on: parent_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
array_relationships:
  - name: demandes
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: demande
          schema: public
  - name: enfants
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: enseignement
          schema: public
  - name: priorites
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: priorite
          schema: public
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: ens_id
        table:
          name: responsable
          schema: public
computed_fields:
  - name: groupes_corriges
    definition:
      function:
        name: groupes_corriges
        schema: public
    comment: Le nombre de groupes ouverts, et à défaut le nombre de groupes.
  - name: heures_corrigees
    definition:
      function:
        name: heures_corrigees
        schema: public
    comment: Le nombre d'heures d'enseignement ouvertes par groupe, et à défaut le nombre d'heures d'enseignement.
  - name: total_heures_corrigees
    definition:
      function:
        name: total_heures_corrigees
        schema: public
    comment: Le nombre d'heures d'enseignement ouvertes par groupe multiplié par le nombre de groupes ouverts.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - annee
        - annee_cycle
        - description
        - groupes
        - groupes_ouverts
        - heures
        - heures_ouvertes
        - id
        - mention_id
        - nom
        - nom_court
        - parcours_id
        - parent_id
        - regle_priorite
        - semestre
        - type
        - visible
      computed_fields:
        - groupes_corriges
        - heures_corrigees
        - total_heures_corrigees
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les enseignements.
  - role: intervenant
    permission:
      columns:
        - annee
        - annee_cycle
        - description
        - groupes
        - groupes_ouverts
        - heures
        - heures_ouvertes
        - id
        - mention_id
        - nom
        - nom_court
        - parcours_id
        - parent_id
        - regle_priorite
        - semestre
        - type
        - visible
      computed_fields:
        - groupes_corriges
        - heures_corrigees
        - total_heures_corrigees
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - _or:
              - _and:
                  - anneeByAnnee:
                      visible:
                        _eq: true
                  - mention:
                      _and:
                        - cursus:
                            visible:
                              _eq: true
                        - visible:
                            _eq: true
                  - parcours:
                      visible:
                        _eq: true
                  - visible:
                      _eq: true
              - responsables:
                  uid:
                    _eq: X-Hasura-User-Id
              - parcours:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
              - mention:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
              - demandes:
                  uid:
                    _eq: X-Hasura-User-Id
              - parent:
                  demandes:
                    _and:
                      - uid:
                          _eq: X-Hasura-User-Id
                      - type:
                          _eq: attribution
    comment: 'Lorsque Geyser est ouvert, les intervenants peuvent voir : 1) les enseignements visibles dont l''année, le cursus, la mention et (éventuellement) le parcours sont tous visibles ; 2) les enseignements dont ils sont responsables (directement ou via le parcours ou la mention) ; 3) les enseignements pour lesquels ils ont fait une demande ou qui leur ont été attribués ; 4) les enseignements dont les enseignements parents leur ont été attribués.'
update_permissions:
  - role: intervenant
    permission:
      columns:
        - description
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - _or:
              - responsables:
                  uid:
                    _eq: X-Hasura-User-Id
              - parcours:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
              - mention:
                  responsables:
                    uid:
                      _eq: X-Hasura-User-Id
      check: null
    comment: Lorsque Geyser est ouvert, les intervenants responsables d'un enseignement, de sa mention ou de son parcours peuvent mettre à jour sa description.
