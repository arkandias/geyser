table:
  name: course_type
  schema: public
array_relationships:
  - name: courses
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: course
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - value
        - label
        - coefficient
        - description
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - current:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les types d'course.
  - role: teacher
    permission:
      columns:
        - value
        - label
        - coefficient
        - description
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _neq: fermeture
              - current:
                  _eq: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir tous les types d'course.
