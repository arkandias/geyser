table:
  name: course_type
  schema: public
array_relationships:
  - name: courses
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: course
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - value
        - label
        - coefficient
        - description
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all course types during assignments phase only"
  - role: teacher
    permission:
      columns:
        - value
        - label
        - coefficient
        - description
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _neq: shutdown
              - current:
                  _eq: true
    comment: "Can view all course types when application is not in shutdown phase"
