table:
  name: modification_service
  schema: public
object_relationships:
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: type_modification
    using:
      foreign_key_constraint_on: type
insert_permissions:
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - service:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      columns:
        - heures_eqtd
        - service_id
        - type
    comment: En phase de voeux, les intervenants peuvent créer des modifications de service pour l'année en cours.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - heures_eqtd
        - service_id
        - type
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir toutes les modifications de service.
  - role: intervenant
    permission:
      columns:
        - id
        - heures_eqtd
        - service_id
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - service:
              anneeByAnnee:
                visible:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir leurs modifications de service pour toutes les années visibles.
update_permissions:
  - role: intervenant
    permission:
      columns:
        - heures_eqtd
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - service:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      check: null
    comment: En phase de voeux, les intervenants peuvent modifier le nombre d'heures et le type de leurs modifications de service pour l'année en cours.
delete_permissions:
  - role: intervenant
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - service:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
    comment: En phase de voeux, les intervenants peuvent supprimer leurs modifications de service pour l'année en cours.
