table:
  name: message
  schema: public
object_relationships:
  - name: anneeByAnnee
    using:
      foreign_key_constraint_on: annee
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
insert_permissions:
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
      columns:
        - annee
        - contenu
        - uid
    comment: En phase de voeux, les intervenants peuvent créer un message pour l'année en cours.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - annee
        - id
        - contenu
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les messages.
  - role: intervenant
    permission:
      columns:
        - annee
        - id
        - contenu
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              visible:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir leurs messages de toutes les années visibles.
update_permissions:
  - role: intervenant
    permission:
      columns:
        - contenu
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
      check: null
    comment: En phase de voeux, les intervenants peuvent modifier le contenu de leur propre message de l'année en cours.
delete_permissions:
  - role: intervenant
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              en_cours:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
    comment: En phase de voeux, les intervenants peuvent supprimer leur propre message de l'année en cours.
