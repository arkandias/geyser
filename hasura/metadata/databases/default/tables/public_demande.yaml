table:
  name: demande
  schema: public
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
  - name: typeByType
    using:
      foreign_key_constraint_on: type
computed_fields:
  - name: heures_eqtd
    definition:
      function:
        name: heures_eqtd
        schema: public
  - name: prioritaire
    definition:
      function:
        name: prioritaire
        schema: public
insert_permissions:
  - role: commissaire
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - enseignement:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - type:
              _eq: attribution
      columns:
        - ens_id
        - heures
        - type
        - uid
    comment: En phase de commission, les commissaires peuvent créer des attributions pour tous les intervenants et pour tous les enseignements de l'année en cours.
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _or:
                - _and:
                    - anneeByAnnee:
                        visible:
                          _eq: true
                    - mention:
                        _and:
                          - cursus:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - parcours:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - responsables:
                    uid:
                      _eq: X-Hasura-User-Id
                - parcours:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - mention:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - demandes:
                    uid:
                      _eq: X-Hasura-User-Id
                - parent:
                    demandes:
                      _and:
                        - uid:
                            _eq: X-Hasura-User-Id
                        - type:
                            _eq: attribution
          - type:
              _neq: attribution
      columns:
        - ens_id
        - heures
        - type
        - uid
    comment: 'En phase de voeux, les intervenants peuvent faire des demandes principales ou secondaires pour : 1) des enseignements visibles dont l''année, le cursus, la mention et (éventuellement) le parcours sont tous visibles ; 2) des enseignements dont ils sont responsables (directement ou via le parcours ou la mention) ; 3) des enseignements pour lesquels ils ont fait une demande ou qui leur ont été attribués ; 4) des enseignements dont les enseignements parents leur ont été attribués.'
select_permissions:
  - role: commissaire
    permission:
      columns:
        - ens_id
        - heures
        - id
        - type
        - uid
      computed_fields:
        - heures_eqtd
        - prioritaire
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir toutes les demandes.
  - role: intervenant
    permission:
      columns:
        - ens_id
        - heures
        - id
        - type
        - uid
      computed_fields:
        - heures_eqtd
        - prioritaire
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - _or:
              - enseignement:
                  _or:
                    - responsables:
                        uid:
                          _eq: X-Hasura-User-Id
                    - parcours:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
                    - mention:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - intervenant:
                      visible:
                        _eq: true
                  - enseignement:
                      _or:
                        - _and:
                            - anneeByAnnee:
                                visible:
                                  _eq: true
                            - mention:
                                _and:
                                  - cursus:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - parcours:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - demandes:
                            uid:
                              _eq: X-Hasura-User-Id
                        - parent:
                            demandes:
                              _and:
                                - uid:
                                    _eq: X-Hasura-User-Id
                                - type:
                                    _eq: attribution
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _eq: consultation
                      - en_cours:
                          _eq: true
              - enseignement:
                  anneeByAnnee:
                    en_cours:
                      _is_null: true
              - type:
                  _neq: attribution
      allow_aggregations: true
    comment: 'Lorsque Geyser est ouvert, les intervenants peuvent voir les demandes des intervenants visibles pour : 1) des enseignements visibles dont l''année, le cursus, la mention et (éventuellement) le parcours sont tous visibles ; 2) des enseignements pour lesquels ils ont fait une demande ou qui leur ont été attribués ; 3) des enseignements dont les enseignements parents leur ont été attribués. Les intervenants responsables d''un enseignement (directement ou via le parcours ou la mention) peuvent voir toutes les demandes pour cet enseignement. Les intervenants ne peuvent voir les attributions pour les enseignements de l''année en cours qu''en phase de consultation.'
update_permissions:
  - role: commissaire
    permission:
      columns:
        - heures
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: commission
                  - en_cours:
                      _eq: true
          - enseignement:
              anneeByAnnee:
                en_cours:
                  _eq: true
          - type:
              _eq: attribution
      check: null
    comment: En phase de commission, les commissaires peuvent modifier toutes les attributions pour des enseignements de l'année en cours.
  - role: intervenant
    permission:
      columns:
        - heures
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _or:
                - _and:
                    - anneeByAnnee:
                        visible:
                          _eq: true
                    - mention:
                        _and:
                          - cursus:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - parcours:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - responsables:
                    uid:
                      _eq: X-Hasura-User-Id
                - parcours:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - mention:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - demandes:
                    uid:
                      _eq: X-Hasura-User-Id
                - parent:
                    demandes:
                      _and:
                        - uid:
                            _eq: X-Hasura-User-Id
                        - type:
                            _eq: attribution
          - type:
              _neq: attribution
      check: null
    comment: En phase de voeux, les intervenants peuvent modifier leurs demandes principales ou secondaires pour tous les enseignements pour lesquels ils peuvent faire des demandes.
