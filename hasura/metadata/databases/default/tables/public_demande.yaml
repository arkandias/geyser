              _where:
                _and:
                  - value:
                      _eq: voeux
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - enseignement:
              _or:
                - _and:
                    - anneeByAnnee:
                        visible:
                          _eq: true
                    - mention:
                        _and:
                          - cursus:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - parcours:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - responsables:
                    uid:
                      _eq: X-Hasura-User-Id
                - parcours:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - mention:
                    responsables:
                      uid:
                        _eq: X-Hasura-User-Id
                - demandes:
                    uid:
