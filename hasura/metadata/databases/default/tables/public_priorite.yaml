table:
  name: priorite
  schema: public
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
select_permissions:
  - role: commissaire
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir toutes les priorités.
  - role: intervenant
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - _or:
              - enseignement:
                  _or:
                    - responsables:
                        uid:
                          _eq: X-Hasura-User-Id
                    - parcours:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
                    - mention:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - intervenant:
                      visible:
                        _eq: true
                  - enseignement:
                      _or:
                        - _and:
                            - anneeByAnnee:
                                visible:
                                  _eq: true
                            - mention:
                                _and:
                                  - cursus:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - parcours:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - demandes:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
                        - parent:
                            demandes:
                              _and:
                                - service:
                                    uid:
                                      _eq: X-Hasura-User-Id
                                - type:
                                    _eq: attribution
    comment: 'Lorsque Geyser est ouvert, les intervenants peuvent voir les priorités des intervenants visibles pour : 1) des enseignements visibles dont l''année, le cursus, la mention et (éventuellement) le parcours sont tous visibles ; 2) des enseignements pour lesquels ils ont fait une demande ou qui leur ont été attribués ; 3) des enseignements dont les enseignements parents leur ont été attribués. Les intervenants responsables d''un enseignement (directement ou via le parcours ou la mention) peuvent voir toutes les priorités pour cet enseignement.'
