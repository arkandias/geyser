table:
  name: priorite
  schema: public
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
select_permissions:
  - role: commissaire
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - service_id
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir toutes les priorités.
  - role: intervenant
    permission:
      columns:
        - anciennete
        - ens_id
        - id
        - prioritaire
        - service_id
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - _or:
              - enseignement:
                  _or:
                    - responsables:
                        uid:
                          _eq: X-Hasura-User-Id
                    - parcours:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
                    - mention:
                        responsables:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      intervenant:
                        visible:
                          _eq: true
                  - enseignement:
                      _or:
                        - _and:
                            - anneeByAnnee:
                                visible:
                                  _eq: true
                            - mention:
                                _and:
                                  - cursus:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - parcours:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - demandes:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
                        - priorites:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
    comment: 'Lorsque Geyser est ouvert, les intervenants peuvent voir les priorités des intervenants visibles pour : 1) des enseignements visibles dont l''année, le cursus, la mention et (éventuellement) le parcours sont tous visibles ; 2) des enseignements pour lesquels ils ont une demande/attribution ou une priorité. Les intervenants responsables d''un enseignement (directement ou via le parcours ou la mention) peuvent voir toutes les priorités pour cet enseignement.'
