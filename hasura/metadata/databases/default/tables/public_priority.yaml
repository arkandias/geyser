table:
  name: priority
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
select_permissions:
  - role: commissioner
    permission:
      columns:
        - course_id
        - id
        - is_priority
        - seniority
        - service_id
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all priorities during assignments phase only"
  - role: teacher
    permission:
      columns:
        - course_id
        - id
        - is_priority
        - seniority
        - service_id
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - course:
                  _or:
                    - coordinations:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - degree:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - track:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
                        - priorities:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
    comment: "When application is not in shutdown phase, can view priorities that are either: (1) for courses under their coordination, or (2) for visible teachers' courses that are either visible with visible year/degree/program/track or linked to their requests/priorities"
