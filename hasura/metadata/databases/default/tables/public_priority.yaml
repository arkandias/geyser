table:
  name: priority
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
select_permissions:
  - role: assigner
    permission:
      columns:
        - seniority
        - course_id
        - id
        - is_priority
        - service_id
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: En phase de assignments, les assigners peuvent voir toutes les priorités.
  - role: teacher
    permission:
      columns:
        - seniority
        - course_id
        - id
        - is_priority
        - service_id
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - course:
                  _or:
                    - coordinations:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - degree:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - track:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
                        - priorities:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
    comment: 'Lorsque Geyser est ouvert, les teachers peuvent voir les priorités des teachers visibles pour : 1) des courses visibles dont l''année, le degree, la program et (éventuellement) le track sont tous visibles ; 2) des courses pour lesquels ils ont une request/assignment ou une priorité. Les teachers coordinators d''un course (directement ou via le track ou la program) peuvent voir toutes les priorités pour cet course.'
