table:
  name: cursus
  schema: public
array_relationships:
  - name: mentions
    using:
      foreign_key_constraint_on:
        column: cursus_id
        table:
          name: mention
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - nom
        - nom_court
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les cursus.
  - role: intervenant
    permission:
      columns:
        - id
        - nom
        - nom_court
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - visible:
              _eq: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir tous les cursus visibles.
