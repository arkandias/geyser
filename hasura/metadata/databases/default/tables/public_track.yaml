table:
  name: track
  schema: public
object_relationships:
  - name: program
    using:
      foreign_key_constraint_on: program_id
array_relationships:
  - name: coordinators
    using:
      foreign_key_constraint_on:
        column: track_id
        table:
          name: coordinator
          schema: public
  - name: courses
    using:
      foreign_key_constraint_on:
        column: track_id
        table:
          name: course
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - program_id
        - name
        - name_short
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - current:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les track.
  - role: teacher
    permission:
      columns:
        - id
        - program_id
        - name
        - name_short
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - current:
                      _eq: true
          - visible:
              _eq: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir tous les track visibles.
