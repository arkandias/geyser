table:
  name: service
  schema: public
object_relationships:
  - name: anneeByAnnee
    using:
      foreign_key_constraint_on: annee
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
array_relationships:
  - name: demandes
    using:
      foreign_key_constraint_on:
        column: service_id
        table:
          name: demande
          schema: public
  - name: modifications
    using:
      foreign_key_constraint_on:
        column: service_id
        table:
          name: modification_service
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - annee
        - heures_eqtd
        - id
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir tous les services.
  - role: intervenant
    permission:
      columns:
        - annee
        - heures_eqtd
        - id
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - anneeByAnnee:
              visible:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir leurs services pour toutes les années visibles.
