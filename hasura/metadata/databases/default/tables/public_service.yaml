table:
  name: service
  schema: public
object_relationships:
  - name: teacher
    using:
      foreign_key_constraint_on: uid
  - name: yearByYear
    using:
      foreign_key_constraint_on: year
array_relationships:
  - name: modifications
    using:
      foreign_key_constraint_on:
        column: service_id
        table:
          name: service_modification
          schema: public
  - name: priorities
    using:
      foreign_key_constraint_on:
        column: service_id
        table:
          name: priority
          schema: public
  - name: requests
    using:
      foreign_key_constraint_on:
        column: service_id
        table:
          name: request
          schema: public
insert_permissions:
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - yearByYear:
              current:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
      columns:
        - year
        - hours
        - message
        - uid
    comment: ""
select_permissions:
  - role: commissioner
    permission:
      columns:
        - year
        - hours
        - id
        - message
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: En phase de assignments, les commissioners peuvent voir tous les services.
  - role: teacher
    permission:
      columns:
        - year
        - hours
        - id
        - message
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - yearByYear:
              visible:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir leurs services pour toutes les années visibles.
update_permissions:
  - role: teacher
    permission:
      columns:
        - hours
        - message
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - yearByYear:
              current:
                _eq: true
          - uid:
              _eq: X-Hasura-User-Id
      check: null
