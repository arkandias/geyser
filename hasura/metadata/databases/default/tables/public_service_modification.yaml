table:
  name: service_modification
  schema: public
object_relationships:
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
insert_permissions:
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      columns:
        - hours
        - service_id
        - type
    comment: "During requests phase, can create service modifications for their own service for current year"
select_permissions:
  - role: commissioner
    permission:
      columns:
        - id
        - hours
        - service_id
        - type
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: "Can view all service modifications during assignments phase only"
  - role: teacher
    permission:
      columns:
        - id
        - hours
        - service_id
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - service:
              yearByYear:
                visible:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: "When application is not in shutdown phase, can view their own service modifications for visible years"
update_permissions:
  - role: teacher
    permission:
      columns:
        - hours
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      check: null
    comment: "During requests phase, can update hours and type for their own service modifications for current year"
delete_permissions:
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
    comment: "During requests phase, can delete their own service modifications for current year"
