table:
  name: service_modification
  schema: public
object_relationships:
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
insert_permissions:
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      columns:
        - hours
        - service_id
        - type
    comment: En phase de voeux, les teachers peuvent créer des modifications de service pour l'année en cours.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - hours
        - service_id
        - type
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - current:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir toutes les modifications de service.
  - role: teacher
    permission:
      columns:
        - id
        - hours
        - service_id
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - current:
                      _eq: true
          - service:
              yearByYear:
                visible:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir leurs modifications de service pour toutes les années visibles.
update_permissions:
  - role: teacher
    permission:
      columns:
        - hours
        - type
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
      check: null
    comment: En phase de voeux, les teachers peuvent modifier le namebre d'hours et le type de leurs modifications de service pour l'année en cours.
delete_permissions:
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              yearByYear:
                current:
                  _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
    comment: En phase de voeux, les teachers peuvent supprimer leurs modifications de service pour l'année en cours.
