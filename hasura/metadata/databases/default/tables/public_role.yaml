table:
  name: role
  schema: public
object_relationships:
  - name: roleType
    using:
      foreign_key_constraint_on: type
  - name: teacher
    using:
      foreign_key_constraint_on: uid
select_permissions:
  - role: commissioner
    permission:
      columns:
        - comment
        - id
        - type
        - uid
      filter:
        uid:
          _eq: X-Hasura-User-Id
    comment: ""
  - role: teacher
    permission:
      columns:
        - comment
        - id
        - type
        - uid
      filter:
        uid:
          _eq: X-Hasura-User-Id
    comment: ""
