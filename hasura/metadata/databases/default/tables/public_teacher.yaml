table:
  name: teacher
  schema: public
object_relationships:
  - name: positionByPosition
    using:
      foreign_key_constraint_on: position
array_relationships:
  - name: coordinations
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: coordination
          schema: public
  - name: services
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: service
          schema: public
insert_permissions:
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - lastname:
              _eq: X-Hasura-Last-Name
          - firstname:
              _eq: X-Hasura-First-Name
      columns:
        - lastname
        - firstname
        - uid
    comment: Lorsque Geyser est ouvert, les teachers peuvent créer leur propre profil.
select_permissions:
  - role: assigner
    permission:
      columns:
        - active
        - alias
        - position
        - base_service_hours
        - lastname
        - firstname
        - uid
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: En phase de assignments, les assigners peuvent voir tous les teachers.
  - role: teacher
    permission:
      columns:
        - position
        - visible
        - active
        - lastname
        - firstname
        - base_service_hours
        - uid
        - alias
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - visible:
              _eq: true
      limit: 1
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir les teachers visibles.
update_permissions:
  - role: teacher
    permission:
      columns:
        - lastname
        - firstname
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - lastname:
              _eq: X-Hasura-Last-Name
          - firstname:
              _eq: X-Hasura-First-Name
      check: null
    comment: Lorsque Geyser est ouvert, les teachers peuvent mettre à jour leur propre profil.
