table:
  name: teacher
  schema: public
object_relationships:
  - name: positionByPosition
    using:
      foreign_key_constraint_on: position
array_relationships:
  - name: coordinations
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: coordination
          schema: public
  - name: roles
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: role
          schema: public
  - name: services
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: service
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - active
        - alias
        - position
        - base_service_hours
        - lastname
        - firstname
        - uid
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: En phase de assignments, les commissioners peuvent voir tous les teachers.
  - role: teacher
    permission:
      columns:
        - position
        - visible
        - active
        - lastname
        - firstname
        - base_service_hours
        - uid
        - alias
      filter:
        _or:
          - uid:
              _eq: X-Hasura-User-Id
          - _and:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _neq: shutdown
                      - current:
                          _eq: true
              - visible:
                  _eq: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir les teachers visibles.
