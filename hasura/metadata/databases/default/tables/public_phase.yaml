table:
  name: phase
  schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - en_cours
        - visible
        - value
        - description
      filter: {}
    comment: Les commissaires peuvent voir toutes les phases.
  - role: intervenant
    permission:
      columns:
        - description
        - en_cours
        - value
        - visible
      filter:
        visible:
          _eq: true
    comment: Les intervenants peuvent voir toutes les phases visibles.
