table:
  name: type_enseignement
  schema: public
array_relationships:
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: enseignement
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - description
        - value
        - coefficient
        - label
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les types d'enseignement.
  - role: intervenant
    permission:
      columns:
        - description
        - value
        - coefficient
        - label
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _neq: fermeture
              - en_cours:
                  _eq: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir tous les types d'enseignement.
