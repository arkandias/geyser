table:
  name: intervenant
  schema: public
array_relationships:
  - name: priorites
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: priorite
          schema: public
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: responsable
          schema: public
  - name: services
    using:
      foreign_key_constraint_on:
        column: uid
        table:
          name: service
          schema: public
insert_permissions:
  - role: intervenant
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - nom:
              _eq: X-Hasura-Last-Name
          - prenom:
              _eq: X-Hasura-First-Name
      columns:
        - nom
        - prenom
        - uid
    comment: Lorsque Geyser est ouvert, les intervenants peuvent créer leur propre profil.
select_permissions:
  - role: commissaire
    permission:
      columns:
        - actif
        - alias
        - nom
        - prenom
        - service
        - uid
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les intervenants.
  - role: intervenant
    permission:
      columns:
        - actif
        - alias
        - nom
        - prenom
        - service
        - uid
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - visible:
              _eq: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir les intervenants visibles.
update_permissions:
  - role: intervenant
    permission:
      columns:
        - nom
        - prenom
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - uid:
              _eq: X-Hasura-User-Id
          - nom:
              _eq: X-Hasura-Last-Name
          - prenom:
              _eq: X-Hasura-First-Name
      check: null
    comment: Lorsque Geyser est ouvert, les intervenants peuvent mettre à jour leur propre profil.
