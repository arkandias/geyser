table:
  name: year
  schema: public
array_relationships:
  - name: courses
    using:
      foreign_key_constraint_on:
        column: year
        table:
          name: course
          schema: public
  - name: services
    using:
      foreign_key_constraint_on:
        column: year
        table:
          name: service
          schema: public
select_permissions:
  - role: assigner
    permission:
      columns:
        - current
        - value
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: En phase de assignments, les assigners peuvent voir toutes les années.
  - role: teacher
    permission:
      columns:
        - current
        - value
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - visible:
              _eq: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir toutes les années visibles.
