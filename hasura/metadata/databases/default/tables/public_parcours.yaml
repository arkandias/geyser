table:
  name: parcours
  schema: public
object_relationships:
  - name: mention
    using:
      foreign_key_constraint_on: mention_id
array_relationships:
  - name: enseignements
    using:
      foreign_key_constraint_on:
        column: parcours_id
        table:
          name: enseignement
          schema: public
  - name: responsables
    using:
      foreign_key_constraint_on:
        column: parcours_id
        table:
          name: responsable
          schema: public
select_permissions:
  - role: commissaire
    permission:
      columns:
        - id
        - mention_id
        - nom
        - nom_court
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
    comment: En phase de commission, les commissaires peuvent voir tous les parcours.
  - role: intervenant
    permission:
      columns:
        - id
        - mention_id
        - nom
        - nom_court
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - visible:
              _eq: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir tous les parcours visibles.
