table:
  name: request
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on:
        - course_id
        - year
  - name: service
    using:
      foreign_key_constraint_on:
        - service_id
        - year
  - name: requestType
    using:
      foreign_key_constraint_on: type
  - name: yearByYear
    using:
      foreign_key_constraint_on: year
computed_fields:
  - name: hoursWeighted
    definition:
      function:
        name: hours_weighted
        schema: public
  - name: isPriority
    definition:
      function:
        name: is_priority
        schema: public
insert_permissions:
  - role: commissioner
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: Can create assignments for current year courses [during assignments phase only]
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _neq: assignment
          - course:
              _or:
                - _and:
                    - visible:
                        _eq: true
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - visible:
                              _eq: true
                          - degree:
                              visible:
                                _eq: true
                    - track:
                        visible:
                          _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
                - priorities:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: 'During requests phase, can create primary and secondary requests for themselves for current year courses that are either: (1) visible with visible year/degree/program/track, (2) under their coordination, or (3) linked to their own requests/priorities'
select_permissions:
  - role: commissioner
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: Can view all requests [during assignments phase only]
  - role: teacher
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - service:
                  uid:
                    _eq: X-Hasura-User-Id
              - course:
                  _or:
                    - coordinations:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - visible:
                                _eq: true
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - visible:
                                      _eq: true
                                  - degree:
                                      visible:
                                        _eq: true
                            - track:
                                visible:
                                  _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
                        - priorities:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _eq: results
                      - current:
                          _eq: true
              - course:
                  yearByYear:
                    current:
                      _neq: true
              - type:
                  _neq: assignment
      allow_aggregations: true
    comment: 'Can view [except during shutdown phase]: (1) their own requests, (2) requests for courses that they coordinate (directly or via program/track), and (3) requests of visible teachers for courses that are either visible with visible year/degree/program/track or linked to their own requests/priorities. Can only view current year assignments during results phase'
update_permissions:
  - role: commissioner
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      check: null
    comment: During assignments phase, can update assignments hours for current year courses
  - role: teacher
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _neq: assignment
          - course:
              _or:
                - _and:
                    - visible:
                        _eq: true
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - visible:
                              _eq: true
                          - degree:
                              visible:
                                _eq: true
                    - track:
                        visible:
                          _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
                - priorities:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
      check: null
    comment: During requests phase, can update their own primary and secondary requests hours for courses for which they can create requests
