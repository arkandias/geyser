table:
  name: request
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
computed_fields:
  - name: hoursWeighted
    definition:
      function:
        name: hours_weighted
        schema: public
  - name: isPriority
    definition:
      function:
        name: is_priority
        schema: public
insert_permissions:
  - role: assigner
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: En phase de assignments, les assigners peuvent créer des assignments pour tous les teachers et pour tous les courses de l'année en cours.
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: 'En phase de requests, les teachers peuvent faire des requests principales ou secondaires pour : 1) des courses visibles dont l''année, le degree, la program et (éventuellement) le track sont tous visibles ; 2) des courses dont ils sont coordinators (directement ou via le track ou la program) ; 3) des courses pour lesquels ils ont une request/assignment ou une priorité.'
select_permissions:
  - role: assigner
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: En phase de assignments, les assigners peuvent voir toutes les requests.
  - role: teacher
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - course:
                  _or:
                    - coordinations:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - degree:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - track:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _eq: results
                      - current:
                          _eq: true
              - course:
                  yearByYear:
                    current:
                      _is_null: true
              - type:
                  _neq: assignment
      allow_aggregations: true
    comment: 'Lorsque Geyser est ouvert, les teachers peuvent voir les requests des teachers visibles pour : 1) des courses visibles dont l''année, le degree, la program et (éventuellement) le track sont tous visibles ; 2) des courses pour lesquels ils ont une request/assignment ou une priorité. Les teachers coordinators d''un course (directement ou via le track ou la program) peuvent voir toutes les requests pour cet course. Les teachers ne peuvent voir les assignments pour les courses de l''année en cours qu''en phase de consultation.'
update_permissions:
  - role: assigner
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      check: null
    comment: En phase de assignments, les assigners peuvent modifier toutes les assignments pour des courses de l'année en cours.
  - role: teacher
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
      check: null
    comment: En phase de requests, les teachers peuvent modifier leurs requests principales ou secondaires pour tous les courses pour lesquels ils peuvent faire des requests.
delete_permissions:
  - role: assigner
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
    comment: En phase de assignments, les assigners peuvent supprimer toutes les assignments pour des courses de l'année en cours.
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
    comment: En phase de requests, les teachers peuvent supprimer leurs requests principales ou secondaires pour tous les courses pour lesquels ils peuvent faire des requests.
