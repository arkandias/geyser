table:
  name: request
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
computed_fields:
  - name: hoursWeighted
    definition:
      function:
        name: hours_weighted
        schema: public
  - name: isPriority
    definition:
      function:
        name: is_priority
        schema: public
insert_permissions:
  - role: commissioner
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: "During assignments phase, can create assignments for current year courses"
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              yearByYear:
                current:
                  _eq: true
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: "During requests phase, can create primary and secondary requests for their own service on current year courses that are either: (1) under their coordination, (2) visible with visible year/degree/program/track, or (3) linked to their requests/priorities"
select_permissions:
  - role: commissioner
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: "Can view all requests during assignments phase only"
  - role: teacher
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hoursWeighted
        - isPriority
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - _or:
              - course:
                  _or:
                    - coordinations:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinations:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - degree:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - track:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _eq: results
                      - current:
                          _eq: true
              - course:
                  yearByYear:
                    current:
                      _is_null: true
              - type:
                  _neq: assignment
      allow_aggregations: true
    comment: "When application is not in shutdown phase, can view requests that are either: (1) for courses under their coordination, or (2) visible teachers' requests for courses that are either visible with visible year/degree/program/track or linked to their requests/priorities. Can only view current year assignments during results phase"
update_permissions:
  - role: commissioner
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
      check: null
    comment: "During assignments phase, can update hours for assignments for current year courses"
  - role: teacher
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
      check: null
    comment: "During requests phase, can update hours for their own primary and secondary requests for courses for which they can create requests"
delete_permissions:
  - role: commissioner
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
    comment: "During assignments phase, can delete assignments for current year courses"
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: assignment
    comment: "During requests phase, can delete their own primary and secondary requests for courses for which they can create requests"
