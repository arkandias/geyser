table:
  name: request
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: service
    using:
      foreign_key_constraint_on: service_id
  - name: typeByType
    using:
      foreign_key_constraint_on: type
computed_fields:
  - name: hours_weighted
    definition:
      function:
        name: hours_weighted
        schema: public
    comment: The requested hours multiplied by the course type coefficient
  - name: is_priority
    definition:
      function:
        name: is_priority
        schema: public
    comment: The request priority based on teaching history and course priority rules
insert_permissions:
  - role: commissaire
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: commission
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: attribution
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: En phase de commission, les commissaires peuvent créer des attributions pour tous les teachers et pour tous les courses de l'année en cours.
  - role: teacher
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinators:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: attribution
      columns:
        - course_id
        - hours
        - service_id
        - type
    comment: 'En phase de voeux, les teachers peuvent faire des requests principales ou secondaires pour : 1) des courses visibles dont l''année, le degree, la program et (éventuellement) le track sont tous visibles ; 2) des courses dont ils sont coordinators (directement ou via le track ou la program) ; 3) des courses pour lesquels ils ont une request/attribution ou une priorité.'
select_permissions:
  - role: commissaire
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hours_weighted
        - is_priority
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - current:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir toutes les requests.
  - role: teacher
    permission:
      columns:
        - course_id
        - hours
        - id
        - service_id
        - type
      computed_fields:
        - hours_weighted
        - is_priority
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - current:
                      _eq: true
          - _or:
              - course:
                  _or:
                    - coordinators:
                        uid:
                          _eq: X-Hasura-User-Id
                    - track:
                        coordinators:
                          uid:
                            _eq: X-Hasura-User-Id
                    - program:
                        coordinators:
                          uid:
                            _eq: X-Hasura-User-Id
              - _and:
                  - service:
                      teacher:
                        visible:
                          _eq: true
                  - course:
                      _or:
                        - _and:
                            - yearByYear:
                                visible:
                                  _eq: true
                            - program:
                                _and:
                                  - degree:
                                      visible:
                                        _eq: true
                                  - visible:
                                      _eq: true
                            - track:
                                visible:
                                  _eq: true
                            - visible:
                                _eq: true
                        - requests:
                            service:
                              uid:
                                _eq: X-Hasura-User-Id
          - _or:
              - _exists:
                  _table:
                    name: phase
                    schema: public
                  _where:
                    _and:
                      - value:
                          _eq: consultation
                      - current:
                          _eq: true
              - course:
                  yearByYear:
                    current:
                      _is_null: true
              - type:
                  _neq: attribution
      allow_aggregations: true
    comment: 'Lorsque Geyser est ouvert, les teachers peuvent voir les requests des teachers visibles pour : 1) des courses visibles dont l''année, le degree, la program et (éventuellement) le track sont tous visibles ; 2) des courses pour lesquels ils ont une request/attribution ou une priorité. Les teachers coordinators d''un course (directement ou via le track ou la program) peuvent voir toutes les requests pour cet course. Les teachers ne peuvent voir les attributions pour les courses de l''année en cours qu''en phase de consultation.'
update_permissions:
  - role: commissaire
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: commission
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: attribution
      check: null
    comment: En phase de commission, les commissaires peuvent modifier toutes les attributions pour des courses de l'année en cours.
  - role: teacher
    permission:
      columns:
        - hours
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinators:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: attribution
      check: null
    comment: En phase de voeux, les teachers peuvent modifier leurs requests principales ou secondaires pour tous les courses pour lesquels ils peuvent faire des requests.
