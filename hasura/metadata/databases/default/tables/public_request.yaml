  - role: commissaire
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: commission
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: attribution
    comment: En phase de commission, les commissaires peuvent supprimer toutes les attributions pour des courses de l'année en cours.
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: voeux
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              _or:
                - _and:
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - degree:
                              visible:
                                _eq: true
                          - visible:
                              _eq: true
                    - track:
                        visible:
                          _eq: true
                    - visible:
                        _eq: true
                - coordinators:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinators:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
          - type:
              _neq: attribution
    comment: En phase de voeux, les teachers peuvent supprimer leurs requests principales ou secondaires pour tous les courses pour lesquels ils peuvent faire des requests.
