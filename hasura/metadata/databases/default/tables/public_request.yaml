  - role: commissioner
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: assignments
                  - current:
                      _eq: true
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _eq: assignment
    comment: During assignments phase, can delete assignments for current year courses
  - role: teacher
    permission:
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _eq: requests
                  - current:
                      _eq: true
          - service:
              uid:
                _eq: X-Hasura-User-Id
          - course:
              yearByYear:
                current:
                  _eq: true
          - type:
              _neq: assignment
          - course:
              _or:
                - _and:
                    - visible:
                        _eq: true
                    - yearByYear:
                        visible:
                          _eq: true
                    - program:
                        _and:
                          - visible:
                              _eq: true
                          - degree:
                              visible:
                                _eq: true
                    - track:
                        visible:
                          _eq: true
                - coordinations:
                    uid:
                      _eq: X-Hasura-User-Id
                - track:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - program:
                    coordinations:
                      uid:
                        _eq: X-Hasura-User-Id
                - requests:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
                - priorities:
                    service:
                      uid:
                        _eq: X-Hasura-User-Id
    comment: During requests phase, can delete their own primary and secondary requests for courses for which they can create requests
