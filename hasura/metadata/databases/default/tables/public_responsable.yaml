table:
  name: responsable
  schema: public
object_relationships:
  - name: enseignement
    using:
      foreign_key_constraint_on: ens_id
  - name: intervenant
    using:
      foreign_key_constraint_on: uid
  - name: mention
    using:
      foreign_key_constraint_on: mention_id
  - name: parcours
    using:
      foreign_key_constraint_on: parcours_id
select_permissions:
  - role: commissaire
    permission:
      columns:
        - commentaire
        - ens_id
        - id
        - mention_id
        - parcours_id
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: commission
              - en_cours:
                  _eq: true
      allow_aggregations: true
    comment: En phase de commission, les commissaires peuvent voir toutes les responsabilités.
  - role: intervenant
    permission:
      columns:
        - commentaire
        - ens_id
        - id
        - mention_id
        - parcours_id
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: fermeture
                  - en_cours:
                      _eq: true
          - intervenant:
              visible:
                _eq: true
          - _or:
              - enseignement:
                  visible:
                    _eq: true
              - parcours:
                  visible:
                    _eq: true
              - mention:
                  visible:
                    _eq: true
      allow_aggregations: true
    comment: Lorsque Geyser est ouvert, les intervenants peuvent voir toutes les responsabilités dont l'intervenant et la mention, le parcours ou l'enseignement correspondant sont visibles.
