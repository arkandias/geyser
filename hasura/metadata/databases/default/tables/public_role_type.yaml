table:
  name: role_type
  schema: public
array_relationships:
  - name: roles
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: role
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - description
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all role types during assignments phase only"
  - role: teacher
    permission:
      columns:
        - description
        - value
      filter: { }
    comment: "Can view all role types"
