table:
  name: degree
  schema: public
array_relationships:
  - name: programs
    using:
      foreign_key_constraint_on:
        column: degree_id
        table:
          name: program
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - id
        - name
        - name_short
        - visible
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all degrees during assignments phase only"
  - role: teacher
    permission:
      columns:
        - id
        - name
        - name_short
        - visible
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - visible:
              _eq: true
    comment: "Can view visible degrees when application is not in shutdown phase"
