table:
  name: coordinator
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
  - name: program
    using:
      foreign_key_constraint_on: program_id
  - name: teacher
    using:
      foreign_key_constraint_on: uid
  - name: track
    using:
      foreign_key_constraint_on: track_id
select_permissions:
  - role: assigner
    permission:
      columns:
        - comment
        - course_id
        - id
        - program_id
        - track_id
        - uid
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
      allow_aggregations: true
    comment: En phase de assignments, les assigners peuvent voir toutes les responsabilités.
  - role: teacher
    permission:
      columns:
        - comment
        - course_id
        - id
        - program_id
        - track_id
        - uid
      filter:
        _and:
          - _exists:
              _table:
                name: phase
                schema: public
              _where:
                _and:
                  - value:
                      _neq: shutdown
                  - current:
                      _eq: true
          - teacher:
              visible:
                _eq: true
          - _or:
              - course:
                  visible:
                    _eq: true
              - track:
                  visible:
                    _eq: true
              - program:
                  visible:
                    _eq: true
      allow_aggregations: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir toutes les responsabilités dont l'teacher et la program, le track ou l'course correspondant sont visibles.
