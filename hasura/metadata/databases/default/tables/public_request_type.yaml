table:
  name: request_type
  schema: public
array_relationships:
  - name: requests
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: request
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - description
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: "Can view all request types during assignments phase only"
  - role: teacher
    permission:
      columns:
        - description
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _neq: shutdown
              - current:
                  _eq: true
    comment: "Can view all request types when application is not in shutdown phase"
