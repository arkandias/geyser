table:
  name: request_type
  schema: public
array_relationships:
  - name: requests
    using:
      foreign_key_constraint_on:
        column: type
        table:
          name: request
          schema: public
select_permissions:
  - role: commissioner
    permission:
      columns:
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _eq: assignments
              - current:
                  _eq: true
    comment: En phase de assignments, les commissioners peuvent voir tous les types de request.
  - role: teacher
    permission:
      columns:
        - value
      filter:
        _exists:
          _table:
            name: phase
            schema: public
          _where:
            _and:
              - value:
                  _neq: shutdown
              - current:
                  _eq: true
    comment: Lorsque Geyser est ouvert, les teachers peuvent voir tous les types de request.
